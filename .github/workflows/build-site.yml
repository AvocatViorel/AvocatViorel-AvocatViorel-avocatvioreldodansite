name: Build ELITE EUROPE WAU

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate site (no heredocs)
        run: |
          python - <<'PY'
          import os, shutil, textwrap

          # Clean old output
          for p in ["index.html","about.html","services.html","fees.html","faq.html","contact.html","diaspora.html",
                    "styles.css","main.js","images","content","admin","data"]:
              if os.path.isdir(p):
                  shutil.rmtree(p)
              elif os.path.isfile(p):
                  os.remove(p)

          os.makedirs("images", exist_ok=True)
          os.makedirs("content/ro", exist_ok=True)
          os.makedirs("content/ru", exist_ok=True)
          os.makedirs("content/en", exist_ok=True)
          os.makedirs("admin", exist_ok=True)
          os.makedirs("data", exist_ok=True)

          INDEX = """<!doctype html>
          <html lang="ro">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <meta name="theme-color" content="#0b0c10"/>
            <meta name="description" content="Avocat Viorel Dodan — consultanță juridică și reprezentare în instanță. Diaspora și Chișinău."/>
            <meta property="og:title" content="Avocat Viorel Dodan — ELITE EUROPE"/>
            <meta property="og:description" content="Reprezentare juridică pentru diaspora și Chișinău."/>
            <meta property="og:type" content="website"/>
            <meta property="og:image" content="/images/hero.webp"/>
            <link rel="stylesheet" href="/styles.css"/>
          </head>
          <body data-page="home">
            <div class="topbar">
              <div class="container nav">
                <div class="brand">
                  <span style="color:var(--gold);font-size:18px;">VD</span>
                  <span>Avocat Viorel Dodan</span>
                  <span class="badge">ELITE EUROPE</span>
                </div>
                <div class="menu">
                  <a href="index.html">Acasă</a>
                  <a href="about.html">Despre</a>
                  <a href="services.html">Servicii</a>
                  <a href="fees.html">Onorarii</a>
                  <a href="faq.html">FAQ</a>
                  <a href="diaspora.html">Diaspora</a>
                  <a href="contact.html">Contact</a>
                </div>
                <div class="lang">
                  <button data-langbtn="ro">RO</button>
                  <button data-langbtn="ru">RU</button>
                  <button data-langbtn="en">EN</button>
                </div>
              </div>
            </div>

            <header class="hero">
              <div class="container hero-inner">
                <div class="kicker"><span class="dot"></span><span>ELITE EUROPE</span><span class="badge">Premium Dark</span></div>
                <div class="h1" data-hero-title>Reprezentare juridică</div>
                <div class="sub" data-hero-sub>Strategică • Profesionistă • Eficientă</div>
                <div class="cta">
                  <a class="btn primary" data-wa href="#"><span>WhatsApp</span></a>
                  <a class="btn ghost" data-call href="#"><span>Sună acum</span></a>
                </div>
              </div>
            </header>

            <main class="section">
              <div class="container">
                <div class="content" data-content></div>

                <div class="section" style="padding-top:8px">
                  <h2 style="margin:0 0 12px">Galerie</h2>
                  <div class="gallery" data-gallery>
                    <a href="/images/gallery-1.webp"><img src="/images/gallery-1.webp" loading="lazy"></a>
                    <a href="/images/gallery-2.webp"><img src="/images/gallery-2.webp" loading="lazy"></a>
                    <a href="/images/gallery-3.webp"><img src="/images/gallery-3.webp" loading="lazy"></a>
                    <a href="/images/gallery-4.webp"><img src="/images/gallery-4.webp" loading="lazy"></a>
                    <a href="/images/gallery-5.webp"><img src="/images/gallery-5.webp" loading="lazy"></a>
                    <a href="/images/gallery-6.webp"><img src="/images/gallery-6.webp" loading="lazy"></a>
                  </div>
                </div>
              </div>
            </main>

            <div class="floatbar">
              <a class="fab" data-fab-wa href="#"><strong>WhatsApp</strong><span class="small">+373 699 682 69</span></a>
              <a class="fab" data-fab-tg href="#"><strong>Telegram</strong><span class="small">mesaj</span></a>
              <a class="fab" data-fab-vb href="#"><strong>Viber</strong><span class="small">chat</span></a>
            </div>

            <div class="lightbox"><img alt="Preview"/></div>

            <footer class="footer">
              <div class="container">
                <div><strong style="color:var(--gold)">Avocat Viorel Dodan</strong> • +373 699 682 69 • viorel.dodan@justice.md</div>
                <div class="small">© www.vioreldodan.com • Premium Dark (Lux + Gold)</div>
              </div>
            </footer>

            <script src="/main.js"></script>
          </body>
          </html>
          """

          PAGE = """<!doctype html><html lang="ro"><head>
          <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
          <link rel="stylesheet" href="/styles.css"/>
          </head><body data-page="{key}">
          <div class="topbar"><div class="container nav">
          <div class="brand"><span style="color:var(--gold);font-size:18px;">VD</span><span>Avocat Viorel Dodan</span><span class="badge">ELITE EUROPE</span></div>
          <div class="menu">
          <a href="index.html">Acasă</a><a href="about.html">Despre</a><a href="services.html">Servicii</a><a href="fees.html">Onorarii</a>
          <a href="faq.html">FAQ</a><a href="diaspora.html">Diaspora</a><a href="contact.html">Contact</a>
          </div>
          <div class="lang"><button data-langbtn="ro">RO</button><button data-langbtn="ru">RU</button><button data-langbtn="en">EN</button></div>
          </div></div>
          <main class="section"><div class="container"><div class="content" data-content></div>{extra}</div></main>
          <div class="floatbar">
          <a class="fab" data-fab-wa href="#"><strong>WhatsApp</strong><span class="small">+373 699 682 69</span></a>
          <a class="fab" data-fab-tg href="#"><strong>Telegram</strong><span class="small">mesaj</span></a>
          <a class="fab" data-fab-vb href="#"><strong>Viber</strong><span class="small">chat</span></a>
          </div>
          <div class="lightbox"><img alt="Preview"/></div>
          <footer class="footer"><div class="container"><div><strong style="color:var(--gold)">Avocat Viorel Dodan</strong> • +373 699 682 69 • viorel.dodan@justice.md</div></div></footer>
          <script src="/main.js"></script>
          </body></html>
          """

          STYLES = """:root{--bg:#0b0c10;--text:#e8e9ee;--muted:#b7b9c6;--gold:#d6b35b;--line:rgba(214,179,91,.22);--shadow:0 20px 60px rgba(0,0,0,.55);--radius:18px;--max:1100px}
          *{box-sizing:border-box}html,body{margin:0;padding:0;background:radial-gradient(1200px 600px at 70% -10%, rgba(214,179,91,.16), transparent 60%),radial-gradient(900px 500px at 10% 20%, rgba(214,179,91,.08), transparent 55%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
          a{color:inherit;text-decoration:none}.container{max-width:var(--max);margin:0 auto;padding:0 18px}
          .topbar{position:sticky;top:0;z-index:50;background:rgba(11,12,16,.72);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
          .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:12px}.brand{display:flex;align-items:center;gap:10px;font-weight:700}
          .badge{border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--gold);font-size:12px}
          .menu{display:flex;gap:14px;flex-wrap:wrap}.menu a{color:var(--muted);font-weight:700;font-size:14px}
          .lang{display:flex;gap:6px}.lang button{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--muted);padding:8px 10px;border-radius:12px;font-weight:800}
          .lang button.active{color:var(--text);border-color:rgba(214,179,91,.55)}
          .hero{position:relative;min-height:72vh;display:grid;align-items:center}.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(11,12,16,.88) 0%, rgba(11,12,16,.72) 45%, rgba(11,12,16,.40) 70%, rgba(11,12,16,.88) 100%),url("/images/hero.webp") center/cover no-repeat}
          @media (max-width:820px){.hero{min-height:78vh}.hero::before{background:linear-gradient(180deg, rgba(11,12,16,.88) 0%, rgba(11,12,16,.58) 50%, rgba(11,12,16,.92) 100%),url("/images/hero-mobile.webp") center/cover no-repeat}}
          .hero-inner{position:relative;padding:62px 0}.kicker{display:inline-flex;gap:10px;align-items:center;color:var(--muted);font-weight:900;text-transform:uppercase;font-size:12px}
          .dot{width:8px;height:8px;border-radius:999px;background:var(--gold);box-shadow:0 0 0 6px rgba(214,179,91,.14)}
          .h1{font-size:44px;line-height:1.04;margin:14px 0 12px}@media (max-width:820px){.h1{font-size:34px}}
          .sub{font-size:18px;color:var(--muted);max-width:720px;line-height:1.5}
          .cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
          .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;border-radius:14px;border:1px solid var(--line);font-weight:900}
          .btn.primary{background:linear-gradient(180deg, rgba(214,179,91,.92), rgba(179,138,46,.92));color:#111}
          .btn.ghost{background:rgba(17,19,24,.6)}
          .section{padding:44px 0}.content{background:rgba(17,19,24,.82);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
          .content p,.content li{color:var(--muted);line-height:1.65}
          .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:980px){.gallery{grid-template-columns:repeat(2,1fr)}}
          .gallery a{display:block;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#0c0d12}
          .gallery img{width:100%;height:190px;object-fit:cover;object-position:center 25%}
          .footer{padding:26px 0 40px;color:var(--muted);border-top:1px solid var(--line);margin-top:44px}
          .floatbar{position:fixed;right:14px;bottom:14px;display:flex;flex-direction:column;gap:10px;z-index:80}
          .fab{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:999px;background:rgba(17,19,24,.9);border:1px solid rgba(214,179,91,.28);box-shadow:0 14px 50px rgba(0,0,0,.5)}
          .small{font-size:12px;color:var(--muted)}
          .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.86);display:none;place-items:center;z-index:200;padding:18px}
          .lightbox.open{display:grid}.lightbox img{max-width:min(1000px,92vw);max-height:86vh;border-radius:18px;border:1px solid rgba(214,179,91,.26)}
          """

          MAINJS = """const LANGS=['ro','ru','en'];function getLang(){const u=new URL(location.href);const q=(u.searchParams.get('lang')||'').toLowerCase();const s=localStorage.getItem('lang')||'ro';const l=LANGS.includes(q)?q:(LANGS.includes(s)?s:'ro');localStorage.setItem('lang',l);return l;}
          function setLangButtons(l){document.querySelectorAll('[data-langbtn]').forEach(b=>{b.classList.toggle('active',b.dataset.langbtn===l);b.onclick=()=>{const u=new URL(location.href);u.searchParams.set('lang',b.dataset.langbtn);location.href=u.toString();};});}
          async function ensureMarked(){if(window.marked)return;await new Promise(r=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/marked/marked.min.js';s.onload=r;document.head.appendChild(s);});}
          async function loadMD(p,l){const r=await fetch(`/content/${l}/${p}.md`,{cache:'no-store'});return await r.text();}
          function parseFM(md){if(md.startsWith('---')){const e=md.indexOf('\\n---',3);const fm=md.slice(3,e).trim();const body=md.slice(e+4).trim();const o={};fm.split('\\n').forEach(line=>{const m=line.match(/^([^:]+):\\s*(.*)$/);if(m)o[m[1].trim()]=m[2].trim().replace(/^\"|\"$/g,'');});return {fm:o,body};}return {fm:{},body:md};}
          async function init(){const l=getLang();setLangButtons(l);await ensureMarked();const p=document.body.dataset.page;const raw=await loadMD(p,l);const {fm,body}=parseFM(raw);const c=document.querySelector('[data-content]');if(c)c.innerHTML=marked.parse(body);
          document.querySelectorAll('[data-gallery] a').forEach(a=>a.onclick=(e)=>{e.preventDefault();const lb=document.querySelector('.lightbox');lb.querySelector('img').src=a.href;lb.classList.add('open');});
          const lb=document.querySelector('.lightbox');if(lb)lb.onclick=()=>lb.classList.remove('open');}
          addEventListener('DOMContentLoaded',()=>init().catch(console.error));
          """

          def w(path, s):
              with open(path, "w", encoding="utf-8") as f:
                  f.write(textwrap.dedent(s).lstrip())

          w("index.html", INDEX)
          for key in ["about","services","fees","faq","contact"]:
              w(f"{key}.html", PAGE.format(key=key, extra=""))
          w("diaspora.html", PAGE.format(key="diaspora", extra='<div class="section" style="padding-top:18px"><div class="cardgrid" data-diaspora></div></div>'))

          w("styles.css", STYLES)
          w("main.js", MAINJS)

          w("content/ro/home.md", """---
          title: "Avocat Viorel Dodan — ELITE EUROPE"
          hero_title: "Reprezentare juridică pentru Diaspora și Chișinău"
          hero_subtitle: "Strategică • Profesionistă • Eficientă"
          ---
          **Consultanță juridică & reprezentare în instanță** pentru persoane fizice și diaspora.
          """)

          for p in ["about","services","fees","faq","contact","diaspora"]:
    for lang in ["ro","ru","en"]:
        w(f"content/{lang}/{p}.md", f'---\ntitle: "{p}"\n---\n')

          w("admin/index.html", """<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin</title></head>
          <body><script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script></body></html>
          """)

          w("admin/config.yml", """backend:
            name: github
            repo: AvocatViorel/avocatvioreldodansite
            branch: main

          media_folder: "images"
          public_folder: "/images"

          collections:
            - name: "pages_ro"
              label: "Pagini (RO)"
              folder: "content/ro"
              create: false
              extension: "md"
              format: "frontmatter"
              fields:
                - { label: "Titlu", name: "title", widget: "string" }
                - { label: "Conținut", name: "body", widget: "markdown" }
          """)

          w("data/diaspora.json", """[
            {"key":"france","name":{"ro":"Franța","ru":"Франция","en":"France"},"img":"/images/diaspora-france.webp","desc":{"ro":"Asistență pentru diaspora.","ru":"Помощь для диаспоры.","en":"Diaspora assistance."}},
            {"key":"moldova","name":{"ro":"Moldova","ru":"Молдова","en":"Moldova"},"img":"/images/diaspora-moldova.webp","desc":{"ro":"Consultații în Chișinău.","ru":"Консультации в Кишинёве.","en":"Consulting in Chișinău."}}
          ]""")

          print("OK: site generated")
          PY

      - name: Commit generated site
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Generate WAU site (Premium Dark)" || echo "Nothing to commit"
          git push
