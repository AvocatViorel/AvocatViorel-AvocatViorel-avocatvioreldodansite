<!doctype html>
<html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin PRO — Avocat Viorel Dodan</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>.admin-wrap{max-width:1040px;margin:24px auto;padding:0 18px}textarea{width:100%;min-height:260px}</style>
</head><body>
<div class="topbar"><div class="container nav">
  <a class="brand" href="/ro"><div class="logo">VD</div><div class="brandtext"><div class="name">Admin PRO</div><div class="tag">Avocat Viorel Dodan</div></div></a>
  <div class="lang"><a class="langbtn" href="/ro">Site</a></div>
</div></div>
<div class="admin-wrap">
  <div class="card pad">
    <h2>Editare KV (fără GitHub)</h2>
    <p class="muted">Load/Save pentru <b>site</b> și <b>countries</b>. Necesită KV binding <code>CONTENT</code> și variabile <code>ADMIN_USER</code>/<code>ADMIN_PASS</code>.</p>
    <div class="cta">
      <button class="btn primary" id="loadSite">Load site</button>
      <button class="btn" id="saveSite">Save site</button>
      <button class="btn primary" id="loadCountries">Load countries</button>
      <button class="btn" id="saveCountries">Save countries</button>
    </div>
  </div>
  <div class="card pad" style="margin-top:12px"><h3>site (JSON)</h3><textarea id="siteBox"></textarea></div>
  <div class="card pad" style="margin-top:12px"><h3>countries (JSON)</h3><textarea id="countriesBox"></textarea></div>
</div>
<script>
async function jget(url){ const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(await r.text()); return await r.json(); }
async function jput(url, obj){ const r=await fetch(url,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(obj)}); if(!r.ok) throw new Error(await r.text()); return await r.json(); }
const siteBox=document.getElementById('siteBox'); const countriesBox=document.getElementById('countriesBox');
document.getElementById('loadSite').onclick=async()=>{ siteBox.value=JSON.stringify(await jget('/api/site'),null,2); };
document.getElementById('saveSite').onclick=async()=>{ await jput('/api/site', JSON.parse(siteBox.value)); alert('Saved site'); };
document.getElementById('loadCountries').onclick=async()=>{ countriesBox.value=JSON.stringify(await jget('/api/countries'),null,2); };
document.getElementById('saveCountries').onclick=async()=>{ await jput('/api/countries', JSON.parse(countriesBox.value)); alert('Saved countries'); };
(async()=>{
  try{ siteBox.value=JSON.stringify(await jget('/api/site'),null,2); }catch(e){ siteBox.value='(eroare) '+e.message; }
  try{ countriesBox.value=JSON.stringify(await jget('/api/countries'),null,2); }catch(e){ countriesBox.value='(eroare) '+e.message; }
})();
</script>
</body></html>
